services:
    spark-master:
        image: spark:3.5.1-python3
        container_name: spark-master
        command: [
            "/opt/spark/bin/spark-class",
            "org.apache.spark.deploy.master.Master",
            "--host", "spark-master",
            "--port", "7077",
            "--webui-port", "8080"
        ]
        environment:
            - SPARK_MODE=master
            - SPARK_MASTER_HOST=spark-master
        ports:
            - "8081:8080"
            - "7077:7077"
        volumes:
            - spark-data:/opt/spark-data
        networks:
            - stock_data

    spark-worker:
        image: spark:3.5.1-python3
        container_name: spark-worker
        command: [
            "/opt/spark/bin/spark-class",
            "org.apache.spark.deploy.worker.Worker",
            "spark://spark-master:7077",
            "--webui-port", "8080"
        ]
        environment: 
            - SPARK_WORKER_CORES=2
            - SPARK_WORKER_MEMORY=2G
        depends_on:
            - spark-master
        volumes:
            - spark-data:/opt/spark-data
        networks:
            - stock_data
    
    consumer:
        build:
            context: ./src/Consumer
            dockerfile: dockerfile
        image: stream_consumer
        container_name: consumer
        depends_on:
            - spark-master
            - kafka
            - postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes: 
            - ivy_cache:/opt/spark/work-dir/.ivy2
            - ./src/Consumer:/opt/spark/work-dir/apps
        networks:
            - stock_data

    kafka:
        image: confluentinc/cp-kafka:7.4.10
        container_name: kafka
        hostname: kafka
        ports:
            - "9092:9092"
            - "9094:9094"
        environment:
            KAFKA_KRAFT_MODE: "true"
            KAFKA_PROCESS_ROLES: controller,broker
            KAFKA_NODE_ID: 1
            KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
            KAFKA_LISTENERS: PLAINTEXT_INTERNAL://kafka:9092,PLAINTEXT_EXTERNAL://0.0.0.0:9094,CONTROLLER://kafka:9093
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:9092,PLAINTEXT_EXTERNAL://localhost:9094
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
            KAFKA_LOG_DIRS: /var/lib/kafka/data
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
            KAFKA_LOG_RETENTION_HOURS: 168
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            CLUSTER_ID: "EZDoCui2RUqXKyc346E5Kg"
        volumes:
            - kafka_data:/var/lib/kafka/data
        networks:
            - stock_data
    
    kafka-ui:
        container_name: kafka-ui
        image: provectuslabs/kafka-ui:v0.7.2
        ports:
            - 8085:8080
        depends_on:
            - kafka
        environment:
            KAFKA_CLUSTERS_0_NAME: local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
            DYNAMIC_CONFIG_ENABLED: 'true'
        networks:
            - stock_data

    postgres:
        image: debezium/postgres:17
        container_name: postgres_db
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports: 
            - "5434:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./init/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
        networks:
            - stock_data
    
    pgadmin:
        image: dpage/pgadmin4:9
        container_name: pgadmin
        restart: always
        environment: 
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
        ports:
            - "5050:80"
        depends_on:
            - postgres
        networks:
            - stock_data

volumes: 
    spark-data:
    kafka_data:
    ivy_cache:
    postgres_data:

networks: 
    stock_data:
